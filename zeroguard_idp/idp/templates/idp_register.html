<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroGuard IDP — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#00ff88;--accent2:#7c3aed;--text:#e8e8f0;--text-dim:#888899;--danger:#ff4444;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    .box{width:100%;max-width:430px;background:var(--surface);border:1px solid var(--border);padding:2.5rem;position:relative;z-index:1;}
    .box::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
    .idp-badge{font-size:.65rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--accent);margin-bottom:.3rem;}
    .sub{font-size:.8rem;color:var(--text-dim);margin-bottom:1.5rem;}
    label{display:block;font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.35rem;margin-top:1rem;}
    input,select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:.9rem;padding:.7rem 1rem;outline:none;}
    input:focus,select:focus{border-color:var(--accent);}
    select option{background:var(--surface2);}
    .btn{width:100%;margin-top:1.5rem;background:var(--accent);color:#000;font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;padding:.75rem;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
    .btn:hover{background:#00cc6a;}
    .error{background:rgba(255,68,68,.08);border-left:3px solid var(--danger);color:var(--danger);padding:.6rem .8rem;font-size:.75rem;margin-bottom:1rem;}
    .footer{text-align:center;font-size:.7rem;color:var(--text-dim);margin-top:1.5rem;}
    .footer a{color:var(--accent);text-decoration:none;}
  </style>
</head>
<body>
  <div class="box">
    <div class="idp-badge"><span class="dot"></span> ZeroGuard Identity Provider</div>
    <h1>Create Account</h1>
    <p class="sub">Register your identity with the IDP</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/register">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required autofocus>

      <label>Password (min 8 characters)</label>
      <input type="password" name="password" placeholder="••••••••" required>

      <label>Role</label>
      <select name="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>

      <button type="submit" class="btn">Create Account →</button>
    </form>

    <div class="footer">
      Already have an account? Login via the <a href="http://localhost:5001">client app</a>
    </div>
  </div>
</body>
</html>
