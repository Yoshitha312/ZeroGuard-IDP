<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>IDP Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#00ff88;--accent2:#7c3aed;--text:#e8e8f0;--text-dim:#888899;--danger:#ff4444;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .box{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);padding:2.5rem;position:relative;}
    .box::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
    h1{font-family:'Syne',sans-serif;color:var(--accent);font-size:1.4rem;margin-bottom:.3rem;}
    .sub{color:var(--text-dim);font-size:.75rem;margin-bottom:1.5rem;}
    label{display:block;font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem;margin-top:1rem;}
    input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:.9rem;padding:.7rem 1rem;outline:none;}
    input:focus{border-color:var(--accent);}
    .btn{width:100%;margin-top:1.5rem;background:var(--accent);color:#000;font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;padding:.75rem;border:none;cursor:pointer;}
    .btn:hover{background:#00cc6a;}
    #error{color:var(--danger);font-size:.75rem;margin-top:.75rem;display:none;}
  </style>
</head>
<body>
  <div class="box">
    <h1>IDP Admin</h1>
    <p class="sub">Identity Provider Administration</p>
    <label>Admin Email</label>
    <input type="email" id="email" placeholder="admin@zeroguard.local">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
    <div id="error"></div>
    <button class="btn" onclick="doLogin()">Login →</button>
  </div>
  <script>
    async function doLogin() {
      const fd = new FormData();
      fd.append('email', document.getElementById('email').value);
      fd.append('password', document.getElementById('password').value);
      const res = await fetch('/admin/login', {method:'POST', body:fd});
      const d = await res.json();
      if (d.redirect) window.location.href = d.redirect;
      else { document.getElementById('error').textContent = d.error; document.getElementById('error').style.display='block'; }
    }
  </script>
</body>
</html>
